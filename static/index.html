<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f5f5f8;
      --panel-border: #e2e2ea;
      --text: #1a1a24;
      --muted: #6b6b80;
      --accent: #6b4fd8;
      --accent-soft: rgba(107, 79, 216, 0.12);
      --curate: #d48806;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }

    aside {
      border-right: 1px solid var(--panel-border);
      background: var(--bg);
      padding: 20px 18px;
      overflow: auto;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 20px; font-weight: 600; margin-top: 2px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 14px 0 6px;
    }

    input[type="search"], select, input[type="range"] {
      width: 100%;
    }

    input[type="search"], select {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .player {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
    }

    .player-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .transport {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 10px;
    }

    .transport button {
      min-width: 38px;
      padding: 8px 10px;
    }

    .transport button.icon {
      font-size: 13px;
      line-height: 1;
    }

    .seek-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      margin-bottom: 10px;
    }

    .seek-wrap input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--text);
    }

    #main {
      position: relative;
      background: var(--bg);
      overflow: visible;
    }

    svg {
      width: 100%;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
      overflow: visible;
    }

    svg.is-panning {
      cursor: grabbing;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .grid-line {
      stroke: rgba(0, 0, 0, 0.035);
      stroke-width: 0.5;
      pointer-events: none;
    }

    .grid-line.major {
      stroke: rgba(0, 0, 0, 0.055);
      stroke-width: 0.5;
    }

    .tick-label {
      fill: var(--muted);
      font-size: 9px;
      pointer-events: none;
    }

    .set-moments,
    .grid {
      pointer-events: none;
    }

    .node {
      pointer-events: none;
    }

    .node circle.core {
      pointer-events: all;
      stroke-width: 0.75px;
      cursor: pointer;
      vector-effect: non-scaling-stroke;
    }

    .link {
      stroke: rgba(80, 80, 120, 0.05);
      stroke-width: 0.5;
      pointer-events: none;
    }

    .links,
    .mix-links {
      pointer-events: none;
    }

    .link.highlight,
    .mix-link {
      stroke: rgba(107, 79, 216, 0.28);
      stroke-width: 0.75;
      vector-effect: non-scaling-stroke;
    }

    .node.selected circle.core {
      stroke: #1a1a24;
      stroke-width: 1.25px;
      filter: drop-shadow(0 0 4px rgba(107, 79, 216, 0.25));
    }

    .node.playing circle.core {
      stroke: var(--accent);
      stroke-width: 1.25px;
    }

    .node.to-curate circle.core {
      stroke-dasharray: 2 2;
      stroke-width: 0.75px;
    }

    .node.bpm-corrected circle.core {
      stroke-dasharray: 1.5 2;
    }

    .node.dim circle.core {
      opacity: 0.08;
    }

    .node.neighbor circle.core {
      stroke: var(--accent);
      stroke-width: 1.25px;
      filter: none;
    }

    #neighbors-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    #neighbors-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .legend {
      position: absolute;
      right: 18px;
      bottom: 18px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
      max-height: 220px;
      overflow: auto;
      width: 150px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-bottom: 5px;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      max-width: 280px;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 5;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .tooltip strong { display: block; margin-bottom: 4px; }
    .tooltip .row { color: var(--muted); }

    .topbar {
      position: absolute;
      left: 18px;
      top: 18px;
      display: flex;
      gap: 8px;
      z-index: 4;
    }

    .pill {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    .moments-legend {
      position: absolute;
      left: 18px;
      bottom: 18px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
      width: 150px;
      max-height: 240px;
      overflow: auto;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .moments-legend strong {
      display: block;
      font-size: 11px;
      color: #444;
      margin-bottom: 8px;
    }

    .moment-label {
      fill: rgba(30, 30, 45, 0.38);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      pointer-events: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside>
      <h1>Track Graph</h1>
      <div class="subtitle">BPM × energy map · estimated mix hints</div>

      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Visible</div><div class="stat-value" id="stat-visible">–</div></div>
        <div class="stat"><div class="stat-label">Links</div><div class="stat-value" id="stat-links">–</div></div>
        <div class="stat"><div class="stat-label">Library</div><div class="stat-value" id="stat-library">–</div></div>
        <div class="stat"><div class="stat-label">Curate</div><div class="stat-value" id="stat-curate">–</div></div>
      </div>

      <label for="search">Search</label>
      <input id="search" type="search" placeholder="Artist or title…" />

      <label>Source</label>
      <div class="chip-row" id="source-filters">
        <button class="chip active" data-source="all">All</button>
        <button class="chip active" data-source="tracks">Library</button>
        <button class="chip active" data-source="to_curate">To Curate</button>
      </div>

      <label for="genre">Genre / batch</label>
      <select id="genre"><option value="all">All genres</option></select>

      <label>BPM range <span id="bpm-label"></span></label>
      <input id="bpm-min" type="range" min="70" max="180" value="70" />
      <input id="bpm-max" type="range" min="80" max="180" value="180" />

      <label>Layout</label>
      <div class="chip-row" id="layout-modes">
        <button class="chip active" data-layout="mix">Mix map</button>
        <button class="chip" data-layout="explore">Explore</button>
      </div>

      <label>Map overlays</label>
      <div class="chip-row" id="overlay-toggles">
        <button class="chip active" id="moments-toggle">Set moments</button>
      </div>

      <div class="player">
        <div class="player-title" id="now-title">Nothing playing</div>
        <div class="player-meta" id="now-meta">Click a node to preview</div>
        <div class="transport">
          <button class="secondary icon" id="prev-btn" title="Previous">◀</button>
          <button class="icon" id="play-btn" title="Play / Pause">▶</button>
          <button class="secondary icon" id="stop-btn" title="Stop">■</button>
          <button class="secondary icon" id="next-btn" title="Next">▶|</button>
        </div>
        <div class="seek-wrap">
          <input id="seek" type="range" min="0" max="1000" value="0" disabled />
          <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>
        <div class="controls">
          <button class="secondary" id="neighbors-btn">Mix neighbors</button>
          <button class="secondary" id="reset-view-btn">Reset view</button>
        </div>
        <audio id="audio" preload="metadata"></audio>
      </div>
    </aside>

    <main id="main">
      <div class="topbar">
        <div class="pill" id="view-hint">Scroll to zoom in · drag empty space to pan · BPM × energy grid stays fixed</div>
        <div class="pill">Dashed ring = To Curate</div>
      </div>
      <div class="legend" id="legend"></div>
      <div class="moments-legend" id="moments-legend" hidden></div>
      <div class="tooltip" id="tooltip"></div>
      <svg id="graph"></svg>
    </main>
  </div>

  <script>
    const CAMELOT_COLORS = {
      "1A": "#C62828", "1B": "#EF5350", "2A": "#E65100", "2B": "#FF9800",
      "3A": "#F57F17", "3B": "#FFCA28", "4A": "#9E9D24", "4B": "#CDDC39",
      "5A": "#558B2F", "5B": "#8BC34A", "6A": "#2E7D32", "6B": "#66BB6A",
      "7A": "#00695C", "7B": "#26A69A", "8A": "#00838F", "8B": "#4DD0E1",
      "9A": "#1565C0", "9B": "#42A5F5", "10A": "#4527A0", "10B": "#7E57C2",
      "11A": "#6A1B9A", "11B": "#AB47BC", "12A": "#AD1457", "12B": "#EC407A"
    };

    const LOW_BPM_CONFIDENCE = 0.45;

    const PLOT = {
      margin: { top: 44, right: 36, bottom: 52, left: 52 },
      inset: { left: 52, right: 36, top: 52, bottom: 40 },
      bpmDomain: [70, 180],
      energyDomain: [0, 1]
    };

    // Fixed BPM × energy regions — visual guide only, not per-track labels.
    const SET_MOMENTS = [
      { id: "close-eyes", label: "Close eyes", bpm: [70, 98], energy: [0.05, 0.42], color: "#7986CB" },
      { id: "chill-groove", label: "Chill groove", bpm: [88, 112], energy: [0.35, 0.58], color: "#AED581" },
      { id: "slow-burn", label: "Slow burn", bpm: [70, 100], energy: [0.43, 0.88], color: "#FFAB91" },
      { id: "warmup", label: "Warm up", bpm: [80, 118], energy: [0.05, 0.58], color: "#5B8DEF" },
      { id: "closing", label: "Closing", bpm: [92, 126], energy: [0.05, 0.50], color: "#90A4AE" },
      { id: "playful", label: "Playful", bpm: [108, 134], energy: [0.40, 0.74], color: "#6FBF73" },
      { id: "groove", label: "Groove", bpm: [80, 124], energy: [0.50, 0.82], color: "#FFB74D" },
      { id: "peak", label: "Peak", bpm: [112, 142], energy: [0.56, 0.95], color: "#E57373" },
      { id: "hypnotic", label: "Hypnotic", bpm: [128, 180], energy: [0.30, 0.72], color: "#4DB6AC" },
      { id: "hard", label: "Hard / driving", bpm: [126, 180], energy: [0.66, 1.0], color: "#9575CD" },
      { id: "minimal", label: "Strip-back", bpm: [118, 180], energy: [0.05, 0.38], color: "#B0BEC5" }
    ];

    const state = {
      data: null,
      selectedId: null,
      playingId: null,
      playQueue: [],
      playIndex: -1,
      highlightNeighbors: false,
      layout: "mix",
      showMoments: true,
      sources: new Set(["tracks", "to_curate"]),
      genre: "all",
      search: "",
      bpmMin: 70,
      bpmMax: 180,
      zoomTransform: d3.zoomIdentity,
      zoomBehavior: null,
      prevLayout: "mix",
      viewport: null,
      axisLayer: null,
      svg: null,
      plotWidth: 0,
      plotHeight: 0
    };

    const audio = document.getElementById("audio");
    const seek = document.getElementById("seek");
    const tooltip = document.getElementById("tooltip");

    function camelotColor(key) {
      return CAMELOT_COLORS[key] || "#555770";
    }

    function plotSize() {
      const width = document.getElementById("main").clientWidth;
      const height = window.innerHeight;
      return {
        width,
        height,
        plotWidth: width - PLOT.margin.left - PLOT.margin.right,
        plotHeight: height - PLOT.margin.top - PLOT.margin.bottom
      };
    }

    function bpmScale(plotWidth) {
      return d3.scaleLinear()
        .domain(PLOT.bpmDomain)
        .range([PLOT.inset.left, plotWidth - PLOT.inset.right]);
    }

    function energyScale(plotHeight) {
      return d3.scaleLinear()
        .domain(PLOT.energyDomain)
        .range([plotHeight - PLOT.inset.bottom, PLOT.inset.top]);
    }

    function softBound(value, min, max, id, spread = 14) {
      if (value >= min && value <= max) return value;
      const [j] = stableJitter(id, spread, 0);
      if (value < min) return min + Math.abs(j) * 0.65;
      return max - Math.abs(j) * 0.65;
    }

    function boundToPlot(x, y, plotWidth, plotHeight, id, pad = 6) {
      const minX = pad;
      const maxX = plotWidth - pad;
      const minY = pad;
      const maxY = plotHeight - pad;
      return {
        x: softBound(x, minX, maxX, `${id}:x`),
        y: softBound(y, minY, maxY, `${id}:y`)
      };
    }

    function stableJitter(id, ampX = 28, ampY = 18) {
      let h = 2166136261;
      for (let i = 0; i < id.length; i++) {
        h ^= id.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      const angle = ((h & 0xffff) / 0xffff) * Math.PI * 2;
      const radius = (((h >>> 16) & 0xffff) / 0xffff);
      const jx = Math.cos(angle) * radius * ampX;
      const jy = Math.sin(angle) * radius * ampY;
      // Bias jitter downward slightly so high-energy nodes don't clip the top edge.
      return [jx, jy >= 0 ? jy * 0.55 : jy];
    }

    function trackPosition(track, x, y, jitter = true, plotWidth = null, plotHeight = null) {
      const cx = track.bpm != null
        ? x(track.bpm)
        : x(PLOT.bpmDomain[0] + (PLOT.bpmDomain[1] - PLOT.bpmDomain[0]) / 2);
      const cy = y(track.energy ?? 0.5);
      let px = cx;
      let py = cy;
      if (jitter) {
        const [jx, jy] = stableJitter(track.id);
        px = cx + jx;
        py = cy + jy;
      }
      if (plotWidth != null && plotHeight != null) {
        return boundToPlot(px, py, plotWidth, plotHeight, track.id);
      }
      return { x: px, y: py };
    }

    function momentEllipse(moment, x, y) {
      const bpmMid = (moment.bpm[0] + moment.bpm[1]) / 2;
      const energyMid = (moment.energy[0] + moment.energy[1]) / 2;
      const cx = x(bpmMid);
      const cy = y(energyMid);
      const rx = Math.max(24, (x(moment.bpm[1]) - x(moment.bpm[0])) / 2 * 1.14);
      const ry = Math.max(18, Math.abs(y(moment.energy[0]) - y(moment.energy[1])) / 2 * 1.14);
      return { cx, cy, rx, ry };
    }

    function ensureMomentDefs(svg) {
      if (!svg.select("#moment-blur").empty()) return;
      const defs = svg.append("defs");
      defs.append("filter")
        .attr("id", "moment-blur")
        .attr("x", "-50%")
        .attr("y", "-50%")
        .attr("width", "200%")
        .attr("height", "200%")
        .append("feGaussianBlur")
        .attr("stdDeviation", 16);
    }

    function drawSetMoments(container, x, y) {
      const layer = container.append("g").attr("class", "set-moments");

      SET_MOMENTS.forEach(moment => {
        const { cx, cy, rx, ry } = momentEllipse(moment, x, y);
        layer.append("ellipse")
          .attr("cx", cx)
          .attr("cy", cy)
          .attr("rx", rx)
          .attr("ry", ry)
          .attr("fill", moment.color)
          .attr("fill-opacity", 0.09)
          .attr("filter", "url(#moment-blur)")
          .style("pointer-events", "none");

        layer.append("text")
          .attr("class", "moment-label")
          .attr("x", cx)
          .attr("y", cy + 4)
          .attr("text-anchor", "middle")
          .text(moment.label);
      });
    }

    function updateMomentsLegend() {
      const legend = document.getElementById("moments-legend");
      const visible = state.showMoments;
      legend.hidden = !visible;
      if (!visible) return;
      legend.innerHTML = "<strong>Set moments</strong>";
      SET_MOMENTS.forEach(moment => {
        const row = document.createElement("div");
        row.className = "legend-item";
        row.innerHTML = `<span class="legend-dot" style="background:${moment.color}"></span>${moment.label}`;
        legend.appendChild(row);
      });
    }

    function drawGrid(container, x, y, plotWidth, plotHeight) {
      const grid = container.append("g").attr("class", "grid");

      for (let bpm = PLOT.bpmDomain[0]; bpm <= PLOT.bpmDomain[1]; bpm += 20) {
        const px = x(bpm);
        grid.append("line")
          .attr("class", "grid-line major")
          .attr("x1", px).attr("x2", px)
          .attr("y1", 0).attr("y2", plotHeight);
        grid.append("text")
          .attr("class", "tick-label")
          .attr("x", px)
          .attr("y", plotHeight + 14)
          .attr("text-anchor", "middle")
          .text(bpm);
      }

      for (let e = 0; e <= 1.001; e += 0.5) {
        const py = y(e);
        grid.append("line")
          .attr("class", "grid-line major")
          .attr("x1", 0).attr("x2", plotWidth)
          .attr("y1", py).attr("y2", py);
        grid.append("text")
          .attr("class", "tick-label")
          .attr("x", -8)
          .attr("y", py + 3)
          .attr("text-anchor", "end")
          .text(e.toFixed(1));
      }
    }

    function drawAxisLabels(layer, plotWidth, plotHeight) {
      layer.selectAll("*").remove();
      layer.append("text")
        .attr("class", "axis-label")
        .attr("x", PLOT.margin.left + plotWidth / 2)
        .attr("y", PLOT.margin.top + plotHeight + 40)
        .attr("text-anchor", "middle")
        .text("BPM →");
      layer.append("text")
        .attr("class", "axis-label")
        .attr("x", 16)
        .attr("y", PLOT.margin.top + plotHeight / 2)
        .attr("transform", `rotate(-90 16 ${PLOT.margin.top + plotHeight / 2})`)
        .attr("text-anchor", "middle")
        .text("Energy →");
    }

    function clampTransform(transform, plotWidth, plotHeight, layout = state.layout) {
      const k = Math.max(1, Math.min(10, transform.k));
      let x = transform.x;
      let y = transform.y;

      if (layout === "explore") {
        const pad = 240;
        const minX = PLOT.margin.left + plotWidth * (1 - k) - pad;
        const maxX = PLOT.margin.left + pad;
        const minY = PLOT.margin.top + plotHeight * (1 - k) - pad;
        const maxY = PLOT.margin.top + pad;
        x = Math.min(maxX, Math.max(minX, x));
        y = Math.min(maxY, Math.max(minY, y));
        return d3.zoomIdentity.translate(x, y).scale(k);
      }

      if (k <= 1.001) {
        x = PLOT.margin.left;
        y = PLOT.margin.top;
      } else {
        const minX = PLOT.margin.left + plotWidth * (1 - k);
        const maxX = PLOT.margin.left;
        const minY = PLOT.margin.top + plotHeight * (1 - k);
        const maxY = PLOT.margin.top;
        x = Math.min(maxX, Math.max(minX, x));
        y = Math.min(maxY, Math.max(minY, y));
      }
      return d3.zoomIdentity.translate(x, y).scale(k);
    }

    function fitTransformToNodes(tracks, plotWidth, plotHeight, padding = 64) {
      const pts = tracks.filter(t => t.x != null && t.y != null);
      if (!pts.length) {
        return d3.zoomIdentity.translate(PLOT.margin.left, PLOT.margin.top);
      }
      const minX = d3.min(pts, t => t.x) - padding;
      const maxX = d3.max(pts, t => t.x) + padding;
      const minY = d3.min(pts, t => t.y) - padding;
      const maxY = d3.max(pts, t => t.y) + padding;
      const dx = Math.max(maxX - minX, 120);
      const dy = Math.max(maxY - minY, 120);
      const scale = Math.min(8, Math.max(1, 0.88 / Math.max(dx / plotWidth, dy / plotHeight)));
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      return clampTransform(
        d3.zoomIdentity
          .translate(PLOT.margin.left, PLOT.margin.top)
          .translate(plotWidth / 2, plotHeight / 2)
          .scale(scale)
          .translate(-cx, -cy),
        plotWidth,
        plotHeight,
        "explore"
      );
    }
    function formatDuration(sec) {
      if (!sec) return "–";
      const m = Math.floor(sec / 60);
      const s = Math.round(sec % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function filteredTracks() {
      const q = state.search.trim().toLowerCase();
      return state.data.tracks.filter(t => {
        if (!state.sources.has(t.source)) return false;
        if (state.genre !== "all" && t.genre !== state.genre && t.batch !== state.genre) return false;
        if (t.bpm != null && (t.bpm < state.bpmMin || t.bpm > state.bpmMax)) return false;
        if (q) {
          const hay = `${t.artist} ${t.title} ${t.genre} ${t.batch || ""}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
    }

    function edgeEndpointId(endpoint) {
      return typeof endpoint === "object" && endpoint != null ? endpoint.id : endpoint;
    }

    function visibleEdgeSet(trackIds) {
      const ids = new Set(trackIds.map(t => t.id));
      return state.data.edges.filter(e => {
        const src = edgeEndpointId(e.source);
        const tgt = edgeEndpointId(e.target);
        return ids.has(src) && ids.has(tgt);
      });
    }

    function linkForceData(edges) {
      return edges.map(e => ({
        ...e,
        source: edgeEndpointId(e.source),
        target: edgeEndpointId(e.target),
      }));
    }

    function mixScore(a, b) {
      if (!a.key || !b.key || a.bpm == null || b.bpm == null) return 0;

      const ka = a.key.toUpperCase();
      const kb = b.key.toUpperCase();
      let harmonic = 0;
      if (ka === kb) harmonic = 1;
      else {
        const na = ka.slice(0, -1), la = ka.slice(-1);
        const nb = kb.slice(0, -1), lb = kb.slice(-1);
        if (na === nb && la !== lb) harmonic = 0.82;
        else {
          let diff = Math.abs(Number(na) - Number(nb));
          diff = Math.min(diff, 12 - diff);
          if (la === lb && diff === 1) harmonic = 0.72;
          else if (diff === 1) harmonic = 0.55;
        }
      }
      if (!harmonic) return 0;

      const diff = Math.abs(a.bpm - b.bpm);
      let bpmFactor = 0;
      if (diff <= 1) bpmFactor = 1;
      else if (diff <= 2) bpmFactor = 0.9;
      else if (diff <= 4) bpmFactor = 0.7;
      else if (diff <= 6) bpmFactor = 0.45;
      return harmonic * bpmFactor;
    }

    function mixNeighbors(trackId, tracks) {
      const selected = tracks.find(t => t.id === trackId);
      if (!selected) return { ids: new Set([trackId]), list: [] };

      const list = tracks.filter(t => t.id !== trackId && mixScore(selected, t) >= 0.45);
      list.sort((a, b) => mixScore(selected, b) - mixScore(selected, a));
      const ids = new Set([trackId, ...list.map(t => t.id)]);
      return { ids, list };
    }

    function neighborIds(trackId) {
      return mixNeighbors(trackId, filteredTracks()).ids;
    }

    function updateNeighborsButton(activeId, neighborCount) {
      const btn = document.getElementById("neighbors-btn");
      btn.disabled = !activeId;
      btn.classList.toggle("active", state.highlightNeighbors && !!activeId);
      btn.textContent = state.highlightNeighbors && activeId
        ? `Mix neighbors (${Math.max(neighborCount - 1, 0)})`
        : "Mix neighbors";
    }

    function focusOnIds(ids) {
      const { plotWidth, plotHeight } = plotSize();
      const tracks = filteredTracks().filter(t => ids.has(t.id) && t.x != null && t.y != null);
      if (tracks.length < 1 || !state.svg || !state.zoomBehavior) return;

      const transform = state.layout === "explore"
        ? fitTransformToNodes(tracks, plotWidth, plotHeight, 90)
        : (() => {
          const pad = 50;
          const minX = d3.min(tracks, t => t.x) - pad;
          const maxX = d3.max(tracks, t => t.x) + pad;
          const minY = d3.min(tracks, t => t.y) - pad;
          const maxY = d3.max(tracks, t => t.y) + pad;
          const dx = Math.max(maxX - minX, 80);
          const dy = Math.max(maxY - minY, 80);
          const scale = Math.min(8, Math.max(1, 0.82 / Math.max(dx / plotWidth, dy / plotHeight)));
          const cx = (minX + maxX) / 2;
          const cy = (minY + maxY) / 2;
          return clampTransform(
            d3.zoomIdentity
              .translate(PLOT.margin.left, PLOT.margin.top)
              .translate(plotWidth / 2, plotHeight / 2)
              .scale(scale)
              .translate(-cx, -cy),
            plotWidth,
            plotHeight,
            state.layout
          );
        })();

      state.svg.transition().duration(450).call(state.zoomBehavior.transform, transform);
    }

    function updateStats(tracks, edges) {
      document.getElementById("stat-visible").textContent = tracks.length;
      document.getElementById("stat-links").textContent = edges.length;
      document.getElementById("stat-library").textContent = state.data.tracks.filter(t => t.source === "tracks").length;
      document.getElementById("stat-curate").textContent = state.data.tracks.filter(t => t.source === "to_curate").length;
    }

    function syncSourceFilterChips() {
      const both = state.sources.has("tracks") && state.sources.has("to_curate");
      document.querySelectorAll("#source-filters .chip").forEach(chip => {
        const src = chip.dataset.source;
        chip.classList.toggle("active", src === "all" ? both : state.sources.has(src));
      });
    }

    function updatePlayButton() {
      document.getElementById("play-btn").textContent = audio.paused ? "▶" : "❚❚";
    }

    function updateSeekUi() {
      const total = audio.duration;
      const current = audio.currentTime;
      if (!Number.isFinite(total) || total <= 0) {
        seek.disabled = true;
        seek.value = 0;
        document.getElementById("time-current").textContent = "0:00";
        document.getElementById("time-total").textContent = "0:00";
        return;
      }
      seek.disabled = false;
      seek.value = Math.round((current / total) * 1000);
      document.getElementById("time-current").textContent = formatDuration(current);
      document.getElementById("time-total").textContent = formatDuration(total);
    }

    function formatBpm(track) {
      if (track.bpm == null) return "? BPM";
      if (track.bpm_octave_corrected && track.bpm_raw != null && Math.abs(track.bpm - track.bpm_raw) >= 4) {
        return `${track.bpm} BPM (from ${track.bpm_raw})`;
      }
      return `${track.bpm} BPM`;
    }

    function trackMetaLine(track, extra) {
      return [track.artist, track.bpm != null ? formatBpm(track) : null, track.key || null, track.genre, extra]
        .filter(Boolean)
        .join(" · ");
    }

    function rebuildPlayQueue(preferredId) {
      state.playQueue = filteredTracks();
      if (!state.playQueue.length) {
        state.playIndex = -1;
        return;
      }
      if (preferredId) {
        const idx = state.playQueue.findIndex(t => t.id === preferredId);
        state.playIndex = idx >= 0 ? idx : 0;
      } else if (state.playIndex >= state.playQueue.length) {
        state.playIndex = state.playQueue.length - 1;
      }
    }

    function playTrackAt(index, autoplay = true) {
      if (!state.playQueue.length) rebuildPlayQueue(state.playingId || state.selectedId);
      if (!state.playQueue.length || index < 0 || index >= state.playQueue.length) return;
      state.playIndex = index;
      const track = state.playQueue[index];
      state.selectedId = track.id;
      state.playingId = track.id;
      document.getElementById("now-title").textContent = track.title || "Unknown title";
      document.getElementById("now-meta").textContent = trackMetaLine(track);
      audio.src = `/api/audio/${track.id}`;
      if (autoplay) audio.play().catch(() => {});
      updatePlayButton();
      state.refreshHighlight?.();
    }

    function setNowPlaying(track, autoplay = true) {
      state.playQueue = filteredTracks();
      const idx = state.playQueue.findIndex(t => t.id === track.id);
      playTrackAt(idx >= 0 ? idx : 0, autoplay);
    }

    function togglePlayPause() {
      if (!audio.src) return;
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
      updatePlayButton();
    }

    function stopPlayback() {
      audio.pause();
      audio.currentTime = 0;
      updatePlayButton();
      updateSeekUi();
    }

    function playRelative(step) {
      rebuildPlayQueue(state.playingId || state.selectedId);
      if (!state.playQueue.length) return;
      let idx = state.playIndex >= 0 ? state.playIndex + step : 0;
      if (idx < 0) idx = state.playQueue.length - 1;
      if (idx >= state.playQueue.length) idx = 0;
      playTrackAt(idx, true);
    }

    function buildLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "<strong style='font-size:11px;color:#444'>Camelot</strong>";
      Object.entries(CAMELOT_COLORS).forEach(([code, color]) => {
        const row = document.createElement("div");
        row.className = "legend-item";
        row.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${code}`;
        legend.appendChild(row);
      });
    }

    function populateGenres(tracks) {
      const select = document.getElementById("genre");
      const genres = [...new Set(tracks.flatMap(t => [t.genre, t.batch].filter(Boolean)))].sort();
      genres.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g;
        opt.textContent = g;
        select.appendChild(opt);
      });
    }

    function updateViewHint() {
      const hint = document.getElementById("view-hint");
      if (!hint) return;
      hint.textContent = state.layout === "explore"
        ? "Explore: scroll or pinch to zoom · Option+drag to pan · drag nodes to rearrange"
        : "Mix map: scroll or pinch to zoom · Option+drag to pan · click a node to play";
    }

    function zoomFilter(event) {
      if (event.type === "wheel") return true;
      if (event.type.startsWith("touch")) return true;
      if (event.button === 1) return true;
      if (event.altKey || event.shiftKey) {
        return event.type === "mousedown" && event.button === 0;
      }
      const target = event.target;
      if (target.closest && target.closest("circle.core")) return false;
      return event.type === "mousedown" && event.button === 0;
    }

    function bindZoom(svg, viewport) {
      if (!state.zoomBehavior) {
        state.zoomBehavior = d3.zoom().scaleExtent([1, 10]);
      }
      state.zoomBehavior
        .filter(zoomFilter)
        .on("start", () => svg.classed("is-panning", true))
        .on("end", () => svg.classed("is-panning", false))
        .on("zoom", (event) => {
          const { plotWidth, plotHeight } = plotSize();
          const next = clampTransform(event.transform, plotWidth, plotHeight, state.layout);
          state.zoomTransform = next;
          viewport.attr("transform", next);
        });
      svg.call(state.zoomBehavior);
      svg.call(state.zoomBehavior.transform, state.zoomTransform);
    }

    function renderGraph() {
      const tracks = filteredTracks();
      const edges = visibleEdgeSet(tracks);
      updateStats(tracks, edges);
      rebuildPlayQueue(state.playingId || state.selectedId);

      const { width, height, plotWidth, plotHeight } = plotSize();
      state.plotWidth = plotWidth;
      state.plotHeight = plotHeight;
      const x = bpmScale(plotWidth);
      const y = energyScale(plotHeight);
      let svg = d3.select("#graph");

      if (state.svg && state.viewport) {
        state.viewport.selectAll("*").remove();
        drawAxisLabels(state.axisLayer, plotWidth, plotHeight);
      } else {
        svg.selectAll("*").remove();
        svg.attr("viewBox", `0 0 ${width} ${height}`);

        state.axisLayer = svg.append("g").attr("class", "axis-layer");
        state.viewport = svg.append("g").attr("class", "viewport");
        ensureMomentDefs(svg);
        state.zoomTransform = clampTransform(
          d3.zoomIdentity.translate(PLOT.margin.left, PLOT.margin.top),
          plotWidth,
          plotHeight,
          state.layout
        );
        drawAxisLabels(state.axisLayer, plotWidth, plotHeight);
      }

      bindZoom(svg, state.viewport);
      state.svg = svg;
      svg.attr("viewBox", `0 0 ${width} ${height}`);
      ensureMomentDefs(svg);
      state.viewport.attr("transform", state.zoomTransform);
      drawAxisLabels(state.axisLayer, plotWidth, plotHeight);

      const viewport = state.viewport;

      viewport.append("rect")
        .attr("class", "zoom-surface")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", plotWidth)
        .attr("height", plotHeight)
        .attr("fill", "transparent")
        .style("pointer-events", "none");

      if (state.showMoments) {
        drawSetMoments(viewport, x, y);
      }
      updateMomentsLegend();

      drawGrid(viewport, x, y, plotWidth, plotHeight);

      tracks.forEach(t => {
        const pos = trackPosition(t, x, y, true, plotWidth, plotHeight);
        t.x = pos.x;
        t.y = pos.y;
        t.fx = null;
        t.fy = null;
      });

      const linkData = linkForceData(edges);
      const simulation = d3.forceSimulation(tracks)
        .alphaDecay(0.025)
        .force("link", d3.forceLink(linkData).id(d => d.id).distance(d => 90 - d.score * 40).strength(d => state.layout === "explore" ? d.score * 0.35 : 0))
        .force("charge", d3.forceManyBody().strength(state.layout === "explore" ? -20 : -4))
        .force("collide", d3.forceCollide().radius(6).strength(0.92));

      if (state.layout === "mix") {
        simulation
          .force("x", d3.forceX(d => trackPosition(d, x, y, true, plotWidth, plotHeight).x).strength(0.1))
          .force("y", d3.forceY(d => trackPosition(d, x, y, true, plotWidth, plotHeight).y).strength(0.2));
      } else {
        simulation
          .force("x", d3.forceX(d => trackPosition(d, x, y, true, plotWidth, plotHeight).x).strength(0.06))
          .force("y", d3.forceY(d => trackPosition(d, x, y, true, plotWidth, plotHeight).y).strength(0.12));
      }

      const link = viewport.append("g").attr("class", "links").selectAll("line").data(linkData).join("line")
        .attr("class", "link")
        .style("pointer-events", "none");

      const mixLinks = viewport.append("g").attr("class", "mix-links");

      function updateMixLinks() {
        mixLinks.selectAll("*").remove();
        const active = state.selectedId;
        if (!active || !state.highlightNeighbors) return;
        const selected = tracks.find(t => t.id === active);
        if (!selected || selected.x == null) return;
        const { list } = mixNeighbors(active, tracks);
        mixLinks.selectAll("line")
          .data(list)
          .join("line")
          .attr("class", "link highlight mix-link")
          .attr("vector-effect", "non-scaling-stroke")
          .attr("x1", selected.x)
          .attr("y1", selected.y)
          .attr("x2", d => d.x)
          .attr("y2", d => d.y);
      }

      const drag = d3.drag()
        .clickDistance(4)
        .filter((event) => state.layout === "explore" && !event.altKey && !event.shiftKey)
        .on("start", (event, d) => {
          event.sourceEvent.stopPropagation();
          if (!event.active) simulation.alphaTarget(0.25).restart();
          const [px, py] = d3.pointer(event, viewport.node());
          d.fx = px;
          d.fy = py;
        })
        .on("drag", (event, d) => {
          const [px, py] = d3.pointer(event, viewport.node());
          d.fx = px;
          d.fy = py;
        })
        .on("end", (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
        });

      const node = viewport.append("g").attr("class", "nodes").selectAll("g").data(tracks).join("g")
        .attr("class", d => {
          const parts = ["node"];
          if (d.source === "to_curate") parts.push("to-curate");
          if (d.id === state.playingId) parts.push("playing");
          if (d.bpm_octave_corrected) parts.push("bpm-corrected");
          return parts.join(" ");
        })
        .call(drag);

      node.append("circle")
        .attr("class", "core")
        .attr("vector-effect", "non-scaling-stroke")
        .attr("r", d => 3 + (d.duration_sec ? Math.min(d.duration_sec / 180, 1) : 0))
        .attr("fill", d => camelotColor(d.key))
        .attr("stroke", d => d.source === "to_curate" ? "#d48806" : "rgba(0,0,0,0.12)");

      function refreshHighlight() {
        const active = state.selectedId;
        const neighbors = active && state.highlightNeighbors ? neighborIds(active) : null;
        node.classed("selected", d => d.id === active);
        node.classed("playing", d => d.id === state.playingId);
        node.classed("neighbor", d => neighbors && neighbors.has(d.id) && d.id !== active);
        node.classed("dim", d => neighbors && !neighbors.has(d.id));
        link.classed("highlight", e => {
          if (!active || !state.highlightNeighbors || !neighbors) return false;
          return neighbors.has(e.source.id) && neighbors.has(e.target.id);
        });
        updateMixLinks();
        updateNeighborsButton(active, neighbors ? neighbors.size : 0);

        if (active && state.highlightNeighbors) {
          const { list } = mixNeighbors(active, tracks);
          const playing = state.data.tracks.find(t => t.id === active);
          if (playing && list.length) {
            document.getElementById("now-meta").textContent = trackMetaLine(
              playing,
              `${list.length} mixable neighbor${list.length === 1 ? "" : "s"}`
            );
          }
        } else if (state.playingId) {
          const playing = state.data.tracks.find(t => t.id === state.playingId);
          if (playing) document.getElementById("now-meta").textContent = trackMetaLine(playing);
        }
      }

      node.on("mouseenter", (event, d) => {
        tooltip.style.opacity = 1;
        tooltip.style.left = `${event.pageX + 14}px`;
        tooltip.style.top = `${event.pageY + 10}px`;
        tooltip.innerHTML = `
          <strong>${d.title}</strong>
          <div class="row">${d.artist}</div>
          <div class="row">${formatBpm(d)} · ${d.key || "? key"} · energy ${(d.energy ?? 0.5).toFixed(2)}</div>
          ${d.bpm_octave_corrected && d.bpm_raw != null && Math.abs(d.bpm - d.bpm_raw) >= 4
            ? d.bpm_source === "tag"
              ? `<div class="row">File tag was half-time (${formatBpm({ bpm: d.bpm_raw })}); doubled for DJ tempo.</div>`
              : `<div class="row">Analyzer heard ${d.bpm_raw} BPM; placed using half-time grid.</div>`
            : d.bpm_source === "tag"
              ? `<div class="row">BPM from file tag.</div>`
              : ""}
          ${d.bpm_confidence != null && d.bpm_confidence < LOW_BPM_CONFIDENCE
            ? `<div class="row">Low BPM confidence (${d.bpm_confidence.toFixed(2)}); verify in Rekordbox if needed.</div>`
            : ""}
          <div class="row">${d.genre}${d.batch ? " / " + d.batch : ""} · ${formatDuration(d.duration_sec)}</div>
        `;
      }).on("mousemove", (event) => {
        tooltip.style.left = `${event.pageX + 14}px`;
        tooltip.style.top = `${event.pageY + 10}px`;
      }).on("mouseleave", () => {
        tooltip.style.opacity = 0;
      }).on("click", (_, d) => {
        setNowPlaying(d);
      });

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
        node.attr("transform", d => `translate(${d.x},${d.y})`);
        if (state.highlightNeighbors) updateMixLinks();
      });

      refreshHighlight();
      state.refreshHighlight = refreshHighlight;

      if (state.highlightNeighbors && state.selectedId) {
        simulation.on("end", () => focusOnIds(neighborIds(state.selectedId)));
      }

      if (state.prevLayout !== state.layout) {
        resetView(false);
        state.prevLayout = state.layout;
      }
      updateViewHint();
    }

    function resetView(animate = true) {
      if (!state.svg || !state.zoomBehavior) return;
      const { plotWidth, plotHeight } = plotSize();
      const transform = clampTransform(
        d3.zoomIdentity.translate(PLOT.margin.left, PLOT.margin.top),
        plotWidth,
        plotHeight,
        state.layout
      );
      state.zoomTransform = transform;
      if (animate) {
        state.svg.transition().duration(350).call(state.zoomBehavior.transform, transform);
      } else {
        state.svg.call(state.zoomBehavior.transform, transform);
      }
    }

    async function init() {
      buildLegend();
      const res = await fetch("/api/library");
      state.data = await res.json();
      populateGenres(state.data.tracks);
      renderGraph();

      document.getElementById("search").addEventListener("input", e => {
        state.search = e.target.value;
        renderGraph();
      });

      document.getElementById("genre").addEventListener("change", e => {
        state.genre = e.target.value;
        renderGraph();
      });

      function updateBpmLabel() {
        document.getElementById("bpm-label").textContent = `${state.bpmMin}–${state.bpmMax}`;
      }

      ["bpm-min", "bpm-max"].forEach(id => {
        document.getElementById(id).addEventListener("input", e => {
          state.bpmMin = Number(document.getElementById("bpm-min").value);
          state.bpmMax = Number(document.getElementById("bpm-max").value);
          if (state.bpmMin > state.bpmMax) {
            [state.bpmMin, state.bpmMax] = [state.bpmMax, state.bpmMin];
          }
          updateBpmLabel();
          renderGraph();
        });
      });
      updateBpmLabel();

      document.querySelectorAll("#source-filters .chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const src = chip.dataset.source;
          if (src === "all") {
            const both = state.sources.has("tracks") && state.sources.has("to_curate");
            state.sources = both ? new Set() : new Set(["tracks", "to_curate"]);
          } else if (state.sources.has(src)) {
            state.sources.delete(src);
          } else {
            state.sources.add(src);
          }
          syncSourceFilterChips();
          renderGraph();
        });
      });

      document.querySelectorAll("#layout-modes .chip").forEach(chip => {
        chip.addEventListener("click", () => {
          document.querySelectorAll("#layout-modes .chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          state.layout = chip.dataset.layout;
          renderGraph();
        });
      });

      document.getElementById("moments-toggle").addEventListener("click", (e) => {
        state.showMoments = !state.showMoments;
        e.currentTarget.classList.toggle("active", state.showMoments);
        renderGraph();
      });

      document.getElementById("play-btn").addEventListener("click", togglePlayPause);
      document.getElementById("stop-btn").addEventListener("click", stopPlayback);
      document.getElementById("prev-btn").addEventListener("click", () => playRelative(-1));
      document.getElementById("next-btn").addEventListener("click", () => playRelative(1));

      seek.addEventListener("input", () => {
        if (!Number.isFinite(audio.duration)) return;
        audio.currentTime = (Number(seek.value) / 1000) * audio.duration;
        updateSeekUi();
      });
      audio.addEventListener("timeupdate", updateSeekUi);
      audio.addEventListener("loadedmetadata", updateSeekUi);
      audio.addEventListener("play", updatePlayButton);
      audio.addEventListener("pause", updatePlayButton);
      audio.addEventListener("ended", () => playRelative(1));

      document.getElementById("neighbors-btn").addEventListener("click", () => {
        if (!state.selectedId) {
          document.getElementById("now-meta").textContent = "Select a track on the graph first";
          return;
        }
        state.highlightNeighbors = !state.highlightNeighbors;
        state.refreshHighlight?.();
        if (state.highlightNeighbors) {
          const ids = neighborIds(state.selectedId);
          setTimeout(() => focusOnIds(ids), 300);
        }
      });

      updateNeighborsButton(null, 0);

      document.getElementById("reset-view-btn").addEventListener("click", () => resetView(true));

      window.addEventListener("resize", () => {
        state.svg = null;
        state.viewport = null;
        state.axisLayer = null;
        state.zoomBehavior = null;
        renderGraph();
      });
    }

    init();
  </script>
</body>
</html>
