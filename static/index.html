        row.dataset.momentId = moment.id;
        row.innerHTML = `<span class="moment-cloud" style="color:${moment.color}" aria-hidden="true">☁</span><span class="moment-legend-label">${moment.label}</span>`;
        grid.appendChild(row);
      });
      syncMomentsLegendCollapse();
    }

    function resetMomentsFilter() {
      if (!state.activeMoments.size) return;
      state.activeMoments.clear();
      renderGraph();
    }

    function syncMomentsLegendCollapse() {
      const legend = document.getElementById("moments-legend");
      const toggle = legend?.querySelector(".legend-panel-toggle");
      if (!legend || !toggle) return;
      legend.classList.toggle("is-collapsed", state.momentsLegendCollapsed);
      toggle.setAttribute("aria-expanded", state.momentsLegendCollapsed ? "false" : "true");
    }

    function syncCamelotLegendCollapse() {
      const legend = document.getElementById("legend");
      const toggle = legend?.querySelector(".legend-panel-toggle");
      if (!legend || !toggle) return;
      legend.classList.toggle("is-collapsed", state.camelotLegendCollapsed);
      toggle.setAttribute("aria-expanded", state.camelotLegendCollapsed ? "false" : "true");
    }

    function drawGrid(container, x, y, plotWidth, plotHeight) {
      const grid = container.append("g").attr("class", "grid");

      for (let bpm = PLOT.bpmDomain[0]; bpm <= PLOT.bpmDomain[1]; bpm += 20) {
        const px = x(bpm);
        grid.append("line")
          .attr("class", "grid-line major")
          .attr("x1", px).attr("x2", px)
          .attr("y1", 0).attr("y2", plotHeight);
      }

      for (let e = 0; e <= 1.001; e += 0.5) {
        const py = y(e);
        grid.append("line")
          .attr("class", "grid-line major")
          .attr("x1", 0).attr("x2", plotWidth)
          .attr("y1", py).attr("y2", py);
      }
    }

    function syncAxisTickLabels(transform = state.zoomTransform) {
      if (!state.axisTickLayer) return;
      const { width, height, plotLeft, plotWidth, plotHeight } = plotSize();
      const x = bpmScale(plotWidth);
      const y = energyScale(plotHeight);
      const bpmY = PLOT.margin.top + plotHeight + 18;
      const minX = plotLeft - 8;
      const maxX = plotLeft + plotWidth + 8;
      const minY = PLOT.margin.top - 8;
      const maxY = PLOT.margin.top + plotHeight + 8;
      const maxBpmY = height - playerDockHeight() - 8;
      const bpmTicks = d3.range(PLOT.bpmDomain[0], PLOT.bpmDomain[1] + 1, 20);
      const energyTicks = [0, 0.5, 1];
      const intensityX = plotLeft - 12;

      const bpmLayer = state.axisTickLayer.selectAll(".bpm-ticks").data([null]).join("g").attr("class", "bpm-ticks");
      bpmLayer.selectAll("text")
        .data(bpmTicks)
        .join("text")
        .attr("class", "tick-label bpm-tick-label")
        .attr("text-anchor", "middle")
        .attr("y", Math.min(bpmY, maxBpmY))
        .attr("x", bpm => transform.x + x(bpm) * transform.k)
        .attr("opacity", bpm => {
          const screenX = transform.x + x(bpm) * transform.k;
          return screenX >= minX && screenX <= maxX ? 1 : 0;
        })
        .text(d => d);

      const energyLayer = state.axisTickLayer.selectAll(".energy-ticks").data([null]).join("g").attr("class", "energy-ticks");
      energyLayer.selectAll("text")
        .data(energyTicks)
        .join("text")
        .attr("class", "tick-label energy-tick-label")
        .attr("text-anchor", "end")
        .attr("x", intensityX)
        .attr("y", e => transform.y + y(e) * transform.k + 3)
        .attr("opacity", e => {
          const screenY = transform.y + y(e) * transform.k;
          return screenY >= minY && screenY <= maxY ? 1 : 0;
        })
        .text(e => e.toFixed(1));
    }

    function drawAxisLabels(layer, plotLeft, plotWidth, plotHeight) {
      layer.selectAll(".axis-titles").remove();
      const titles = layer.append("g").attr("class", "axis-titles");
      titles.append("text")
        .attr("class", "axis-label")
        .attr("x", plotLeft + plotWidth / 2)
        .attr("y", PLOT.margin.top + plotHeight + 40)
        .attr("text-anchor", "middle")
        .text("BPM →");
      const intensityLabelX = plotLeft - 34;
      titles.append("text")
        .attr("class", "axis-label axis-label-y")
        .attr("x", intensityLabelX)
        .attr("y", PLOT.margin.top + plotHeight / 2)
        .attr("transform", `rotate(-90 ${intensityLabelX} ${PLOT.margin.top + plotHeight / 2})`)
        .attr("text-anchor", "middle")
        .text("Intensity (est.) →");
      syncAxisTickLabels(state.zoomTransform);
    }

    function clampTransform(transform, plotLeft, plotWidth, plotHeight, layout = state.layout) {
      const k = Math.max(1, Math.min(10, transform.k));
      let x = transform.x;
      let y = transform.y;

      if (layout === "explore") {
        const pad = 240;
        const minX = plotLeft + plotWidth * (1 - k) - pad;
        const maxX = plotLeft + pad;
        const minY = PLOT.margin.top + plotHeight * (1 - k) - pad;
        const maxY = PLOT.margin.top + pad;
        x = Math.min(maxX, Math.max(minX, x));
        y = Math.min(maxY, Math.max(minY, y));
        return d3.zoomIdentity.translate(x, y).scale(k);
      }

      if (k <= 1.001) {
        x = plotLeft;
        y = PLOT.margin.top;
      } else {
        const minX = plotLeft + plotWidth * (1 - k);
        const maxX = plotLeft;
        const minY = PLOT.margin.top + plotHeight * (1 - k);
        const maxY = PLOT.margin.top;
        x = Math.min(maxX, Math.max(minX, x));
        y = Math.min(maxY, Math.max(minY, y));
      }
      return d3.zoomIdentity.translate(x, y).scale(k);
    }

    function fitTransformToNodes(tracks, plotLeft, plotWidth, plotHeight, padding = 64) {
      const pts = tracks.filter(t => t.x != null && t.y != null);
      if (!pts.length) {
        return d3.zoomIdentity.translate(plotLeft, PLOT.margin.top);
      }
      const minX = d3.min(pts, t => t.x) - padding;
      const maxX = d3.max(pts, t => t.x) + padding;
      const minY = d3.min(pts, t => t.y) - padding;
      const maxY = d3.max(pts, t => t.y) + padding;
      const dx = Math.max(maxX - minX, 120);
      const dy = Math.max(maxY - minY, 120);
      const scale = Math.min(8, Math.max(1, 0.88 / Math.max(dx / plotWidth, dy / plotHeight)));
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      return clampTransform(
        d3.zoomIdentity
          .translate(plotLeft, PLOT.margin.top)
          .translate(plotWidth / 2, plotHeight / 2)
          .scale(scale)
          .translate(-cx, -cy),
        plotLeft,
        plotWidth,
        plotHeight,
        "explore"
      );
    }
    function formatDuration(sec) {
      if (!sec) return "–";
      const m = Math.floor(sec / 60);
      const s = Math.round(sec % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function playbackSelection() {
      return {
        highlightNeighbors: state.highlightNeighbors,
        neighborQueueAnchor: state.neighborQueueAnchor,
      };
    }

    function syncPlayQueue() {
      PB.syncPlayQueueState(state, filteredTracks(), playbackSelection());
    }

    function tryPlaySingleSearchResult() {
      if (!state.search.trim() || !state.data) return false;
      const tracks = filteredTracks();
      if (tracks.length !== 1) return false;
      hideSearchResults();
      setNowPlaying(tracks[0]);
      return true;
    }

    function hideSearchResults() {
      const el = document.getElementById("search-results");
      if (!el) return;
      el.hidden = true;
      el.innerHTML = "";
      state.searchResultsIndex = -1;
      state.searchResultsOpen = false;
    }

    function searchResultItemHtml(track, index, { active = false, playing = false } = {}) {
      const title = track.title || "Unknown title";
      const artist = track.artist || "Unknown artist";
      const classes = [
        "neighbor-item",
        "search-result-item",
        active ? "is-active" : "",
        playing ? "is-playing" : "",
      ].filter(Boolean).join(" ");
      return `<button type="button" class="${classes}" data-track-id="${track.id}" data-search-index="${index}" role="option" aria-selected="${active ? "true" : "false"}">
        <span class="neighbor-main">
          <span class="neighbor-title">${title}</span>
          <span class="neighbor-artist">${artist}</span>
        </span>
        ${neighborTrackMetaHtml(track)}
      </button>`;
    }

    function updateSearchResults(tracks) {
      const el = document.getElementById("search-results");
      const input = document.getElementById("search");
      if (!el || !input) return;

      const q = state.search.trim();
      if (!q || !state.searchResultsOpen) {
        hideSearchResults();
        return;
      }

      if (!tracks.length) {
        el.hidden = false;
        el.innerHTML = `<div class="search-results-more">No matches</div>`;
        state.searchResultsIndex = -1;
        return;
      }

      const visible = tracks.slice(0, SEARCH_MAX_RESULTS);
      const more = tracks.length - visible.length;
      if (state.searchResultsIndex >= visible.length) {
        state.searchResultsIndex = visible.length - 1;
      }

      el.innerHTML = visible.map((track, index) => searchResultItemHtml(track, index, {
        active: index === state.searchResultsIndex,
        playing: state.playingId === track.id,
      })).join("") + (more > 0
        ? `<div class="search-results-more">${more} more on the map…</div>`
        : "");
      el.hidden = false;
      syncEllipsisTooltips(el);
    }

    function activateSearchResult(index) {
      const tracks = filteredTracks();
      const track = tracks[index];
      if (!track) return;
      hideSearchResults();
      setNowPlaying(track);
    }

    function moveSearchResultsHighlight(delta) {
      const tracks = filteredTracks().slice(0, SEARCH_MAX_RESULTS);
      if (!tracks.length) return;
      if (state.searchResultsIndex < 0) {
        state.searchResultsIndex = delta > 0 ? 0 : tracks.length - 1;
      } else {
        state.searchResultsIndex = (state.searchResultsIndex + delta + tracks.length) % tracks.length;
      }
      updateSearchResults(filteredTracks());
      const active = document.querySelector(`.search-result-item[data-search-index="${state.searchResultsIndex}"]`);
      active?.scrollIntoView({ block: "nearest" });
    }

    function handleSearchKeydown(event) {
      const tracks = filteredTracks();
      if (event.key === "ArrowDown") {
        event.preventDefault();
        state.searchResultsOpen = true;
        moveSearchResultsHighlight(1);
        return;
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        state.searchResultsOpen = true;
        moveSearchResultsHighlight(-1);
        return;
      }
      if (event.key === "Escape") {
        event.preventDefault();
        hideSearchResults();
        return;
      }
      if (event.key !== "Enter") return;
      event.preventDefault();
      if (state.searchResultsIndex >= 0 && tracks[state.searchResultsIndex]) {
        activateSearchResult(state.searchResultsIndex);
        return;
      }
      tryPlaySingleSearchResult();
    }

    function filteredTracks() {
      const q = state.search.trim().toLowerCase();
      return state.data.tracks.filter(t => {
        if (!state.sources.has(t.source)) return false;
        if (state.genre !== "all" && t.genre !== state.genre && t.batch !== state.genre) return false;
        if (t.bpm != null && (t.bpm < state.bpmMin || t.bpm > state.bpmMax)) return false;
        if (q) {
          const hay = `${t.artist} ${t.title} ${t.genre} ${t.batch || ""}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        if (!trackMatchesActiveMoments(t)) return false;
        if (!trackMatchesActiveKeys(t)) return false;
        return true;
      });
    }

    function edgeEndpointId(endpoint) {
      return typeof endpoint === "object" && endpoint != null ? endpoint.id : endpoint;
    }

    function visibleEdgeSet(trackIds) {
      const ids = new Set(trackIds.map(t => t.id));
      return state.data.edges.filter(e => {
        const src = edgeEndpointId(e.source);
        const tgt = edgeEndpointId(e.target);
        return ids.has(src) && ids.has(tgt);
      });
    }

    function linkForceData(edges) {
      return edges.map(e => ({
        ...e,
        source: edgeEndpointId(e.source),
        target: edgeEndpointId(e.target),
      }));
    }

    function mixScore(a, b) {
      if (!a.key || !b.key || a.bpm == null || b.bpm == null) return 0;

      const ka = a.key.toUpperCase();
      const kb = b.key.toUpperCase();
      let harmonic = 0;
      if (ka === kb) harmonic = 1;
      else {
        const na = ka.slice(0, -1), la = ka.slice(-1);
        const nb = kb.slice(0, -1), lb = kb.slice(-1);
        if (na === nb && la !== lb) harmonic = 0.82;
        else {
          let diff = Math.abs(Number(na) - Number(nb));
          diff = Math.min(diff, 12 - diff);
          if (la === lb && diff === 1) harmonic = 0.72;
          else if (diff === 1) harmonic = 0.55;
        }
      }
      if (!harmonic) return 0;

      const diff = Math.abs(a.bpm - b.bpm);
      let bpmFactor = 0;
      if (diff <= 1) bpmFactor = 1;
      else if (diff <= 2) bpmFactor = 0.9;
      else if (diff <= 4) bpmFactor = 0.7;
      else if (diff <= 6) bpmFactor = 0.45;
      return harmonic * bpmFactor;
    }

    function mixNeighbors(trackId, tracks) {
      return PB.mixNeighbors(trackId, tracks, MIX_MIN_SCORE);
    }

    function neighborAnchorId() {
      if (state.highlightNeighbors && state.neighborQueueAnchor) {
        return state.neighborQueueAnchor;
      }
      return state.selectedId;
    }

    function neighborIds(trackId) {
      return mixNeighbors(trackId, filteredTracks()).ids;
    }

    function updateNeighborsButton(activeId, neighborCount) {
      const btn = document.getElementById("neighbors-btn");
      btn.disabled = !activeId;
      btn.classList.toggle("active", state.highlightNeighbors && !!activeId);
      btn.textContent = state.highlightNeighbors && activeId
        ? `Neighbors (${Math.max(neighborCount - 1, 0)})`
        : "Neighbors";
    }

    function neighborTrackMetaHtml(track, score = null) {
      const bpmVal = track.bpm != null ? Math.round(track.bpm) : "?";
      const keyText = track.key || "?";
      const keyColor = camelotColor(track.key);
      const badges = [
        `<span class="tt-badge bpm neighbor-badge">${bpmVal}</span>`,
        `<span class="tt-badge key neighbor-badge" style="border-color:${keyColor}44;background:${keyColor}1a">${keyText}</span>`,
      ];
      if (score != null) {
        badges.push(`<span class="tt-badge mix-score neighbor-badge">${Math.round(score * 100)}%</span>`);
      }
      return `<span class="neighbor-meta">${badges.join("")}</span>`;
    }

    function neighborListItemHtml(track, { anchor = false, rank = null, score = null, playing = false } = {}) {
      const rankClass = anchor ? "neighbor-rank is-dot" : "neighbor-rank";
      const rankLabel = anchor ? "" : (rank != null ? String(rank) : "");
      const classes = [
        "neighbor-item",
        playing ? "is-active" : "",
      ].filter(Boolean).join(" ");
      const title = track.title || "Unknown title";
      const artist = track.artist || "Unknown artist";
      return `
        <li>
          <button type="button" class="${classes}" data-track-id="${track.id}" role="option" aria-selected="${playing ? "true" : "false"}">
            <span class="${rankClass}">${rankLabel}</span>
            <span class="neighbor-main">
              <span class="neighbor-title">${title}</span>
              <span class="neighbor-artist">${artist}</span>
            </span>
            ${neighborTrackMetaHtml(track, score)}
          </button>
        </li>`;
    }

    function scrollNeighborItemIntoView(trackId) {
      if (!trackId) return;
      const item = document.querySelector(`.neighbor-item[data-track-id="${CSS.escape(trackId)}"]`);
      item?.scrollIntoView({ block: "nearest" });
    }

    function syncNeighborPanelCollapse() {
      const panel = document.getElementById("neighbor-panel");
      const toggle = document.getElementById("neighbor-panel-toggle");
      if (!panel || !toggle) return;
      const collapsed = state.neighborQueueCollapsed && panel.classList.contains("is-visible");
      panel.classList.toggle("is-collapsed", collapsed);
      toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
    }

    function updateNeighborList(tracks) {
      const panel = document.getElementById("neighbor-panel");
      const list = document.getElementById("neighbor-list");
      const countEl = document.getElementById("neighbor-panel-count");
      const emptyEl = document.getElementById("neighbor-empty");
      if (!panel || !list || !countEl || !emptyEl) return;

      const show = state.highlightNeighbors && !!neighborAnchorId();
      panel.classList.toggle("is-visible", show);
      panel.setAttribute("aria-hidden", show ? "false" : "true");
      if (!show) {
        list.innerHTML = "";
        emptyEl.hidden = true;
        countEl.textContent = "";
        return;
      }

      const anchorId = neighborAnchorId();
      const anchor = tracks.find(t => t.id === anchorId)
        || state.data?.tracks.find(t => t.id === anchorId);
      if (!anchor) {
        panel.classList.remove("is-visible");
        panel.setAttribute("aria-hidden", "true");
        list.innerHTML = "";
        countEl.textContent = "";
        return;
      }

      const { list: neighbors } = mixNeighbors(anchorId, tracks);
      countEl.textContent = neighbors.length
        ? `${neighbors.length} mixable`
        : "Anchor only";

      if (!neighbors.length) {
        list.innerHTML = neighborListItemHtml(anchor, {
          anchor: true,
          playing: state.playingId === anchor.id,
        });
        emptyEl.hidden = false;
      } else {
        emptyEl.hidden = true;
        list.innerHTML = [
          neighborListItemHtml(anchor, {
            anchor: true,
            playing: state.playingId === anchor.id,
          }),
          ...neighbors.map((track, index) => neighborListItemHtml(track, {
            rank: index + 1,
            score: mixScore(anchor, track),
            playing: state.playingId === track.id,
          })),
        ].join("");
      }

      scrollNeighborItemIntoView(state.playingId || anchorId);
      syncNeighborPanelCollapse();
      syncEllipsisTooltips(list);
    }

    function viewFilterSignature() {
      return JSON.stringify({
        moments: [...state.activeMoments].sort(),
        keys: [...state.activeKeys].sort(),
        genre: state.genre,
        bpmMin: state.bpmMin,
        bpmMax: state.bpmMax,
        search: state.search.trim().toLowerCase(),
        sources: [...state.sources].sort(),
      });
    }

    function viewFiltersActive() {
      const lo = PLOT.bpmDomain[0];
      const hi = PLOT.bpmDomain[1];
      return state.activeMoments.size > 0
        || state.activeKeys.size > 0
        || state.genre !== "all"
        || state.search.trim() !== ""
        || state.bpmMin > lo
        || state.bpmMax < hi
        || state.sources.size < 2;
    }

    function mixMapFitTransform(tracks, plotLeft, plotWidth, plotHeight) {
      const pad = 50;
      const minX = d3.min(tracks, t => t.x) - pad;
      const maxX = d3.max(tracks, t => t.x) + pad;
      const minY = d3.min(tracks, t => t.y) - pad;
      const maxY = d3.max(tracks, t => t.y) + pad;
      const dx = Math.max(maxX - minX, 80);
      const dy = Math.max(maxY - minY, 80);
      const scale = Math.min(8, Math.max(1, 0.82 / Math.max(dx / plotWidth, dy / plotHeight)));
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      return clampTransform(
        d3.zoomIdentity
          .translate(plotLeft, PLOT.margin.top)
          .translate(plotWidth / 2, plotHeight / 2)
          .scale(scale)
          .translate(-cx, -cy),
        plotLeft,
        plotWidth,
        plotHeight,
        state.layout
      );
    }

    function fitViewTransformForTracks(tracks) {
      const { plotLeft, plotWidth, plotHeight } = plotSize();
      const pts = tracks.filter(t => t.x != null && t.y != null);
      if (!pts.length || !state.svg || !state.zoomBehavior) return null;
      return state.layout === "explore"
        ? fitTransformToNodes(pts, plotLeft, plotWidth, plotHeight, 90)
        : mixMapFitTransform(pts, plotLeft, plotWidth, plotHeight);
    }

    function applyViewTransform(transform, animate = true) {
      if (!transform || !state.svg || !state.zoomBehavior) return;
      state.zoomTransform = transform;
      if (animate) {
        state.svg.transition().duration(450).call(state.zoomBehavior.transform, transform);
      } else {
        state.svg.call(state.zoomBehavior.transform, transform);
      }
    }

    function fitViewToFilteredTracks(animate = true) {
      applyViewTransform(fitViewTransformForTracks(filteredTracks()), animate);
    }

    function scheduleFilterViewFit(fn) {
      if (state.autoFitTimer) clearTimeout(state.autoFitTimer);
      state.autoFitTimer = setTimeout(() => {
        state.autoFitTimer = null;
        fn();
      }, 220);
    }

    function maybeAutoFitViewForFilters(tracks, simulation) {
      const sig = viewFilterSignature();
      if (state.viewFilterSignature == null) {
        state.viewFilterSignature = sig;
        return;
      }
      if (sig === state.viewFilterSignature) return;
      state.viewFilterSignature = sig;

      if (!viewFiltersActive() || !tracks.length) {
        scheduleFilterViewFit(() => resetView(true));
        return;
      }

      const runFit = () => fitViewToFilteredTracks(true);
      if (state.layout === "explore" && simulation) {
        simulation.on("end.autofit", () => {
          simulation.on("end.autofit", null);
          runFit();
        });
        return;
      }
      scheduleFilterViewFit(runFit);
    }

    function focusOnIds(ids) {
      const tracks = filteredTracks().filter(t => ids.has(t.id) && t.x != null && t.y != null);
      if (tracks.length < 1) return;
      applyViewTransform(fitViewTransformForTracks(tracks), true);
    }

    function syncSourceFilterChips() {
      const both = state.sources.has("tracks") && state.sources.has("to_curate");
      document.querySelectorAll("#source-filters .chip").forEach(chip => {
        const src = chip.dataset.source;
        const active = src === "all"
          ? both
          : state.sources.size === 1 && state.sources.has(src);
        chip.classList.toggle("active", active);
      });
    }

    function updatePlayButton() {
      const btn = document.getElementById("play-btn");
      btn.disabled = !audio.src;
      btn.textContent = audio.paused ? "▶" : "❚❚";
    }

    function updateSeekUi() {
      const total = audio.duration;
      const current = audio.currentTime;
      if (!Number.isFinite(total) || total <= 0) {
        document.getElementById("time-current").textContent = "0:00";
        document.getElementById("time-total").textContent = "0:00";
        drawWaveform(0);
        syncWaveformAria(0);
        return;
      }
      document.getElementById("time-current").textContent = formatDuration(current);
      document.getElementById("time-total").textContent = formatDuration(total);
      const progress = current / total;
      drawWaveform(progress);
      syncWaveformAria(progress);
    }

    function formatBpm(track) {
      if (track.bpm == null) return "? BPM";
      if (track.bpm_octave_corrected && track.bpm_raw != null && Math.abs(track.bpm - track.bpm_raw) >= 4) {
        return `${track.bpm} BPM (from ${track.bpm_raw})`;
      }
      return `${track.bpm} BPM`;
    }

    function positionTooltipForTrack(track) {
      const screen = trackScreenPosition(track);
      if (!screen) return;
      tooltip.style.left = `${screen.x + LOUPE.size / 2 + 10}px`;
      tooltip.style.top = `${screen.y - LOUPE.size / 4}px`;
    }

    const VOCALS_SHOW_CONFIDENCE = 0.45;

    function vocalsBadgeHtml(track) {
      const label = track.vocals;
      const conf = track.vocals_confidence;
      if (!label || conf == null || conf < VOCALS_SHOW_CONFIDENCE) return "";
      if (label === "yes") {
        return `<span class="tt-badge vocals" title="Likely vocals (${conf.toFixed(2)} confidence)">Vocals</span>`;
      }
      if (label === "no") {
        return `<span class="tt-badge vocals-inst" title="Likely instrumental (${conf.toFixed(2)} confidence)">Inst</span>`;
      }
      if (label === "unclear") {
        return `<span class="tt-badge vocals-unclear" title="Vocal presence unclear (${conf.toFixed(2)} confidence)">Voc ?</span>`;
      }
      return "";
    }

    function trackBadgeHtml(track) {
      const bpmVal = track.bpm != null ? Math.round(track.bpm) : null;
      const keyText = track.key || "?";
      const keyColor = camelotColor(track.key);
      const energy = (track.energy ?? 0.5).toFixed(2);
      return `
        <span class="tt-badge bpm">${bpmVal != null ? bpmVal : "?"} BPM</span>
        <span class="tt-badge key" style="border-color:${keyColor}44;background:${keyColor}1a">${keyText}</span>
        <span class="tt-badge energy" title="Estimated intensity (0–1)">Int ${energy}</span>
        ${vocalsBadgeHtml(track)}
      `;
    }

    function setPlayerIdle(subtitle = "Click a node on the map to preview") {
      setEllipsisTitle(document.getElementById("now-title"), "Nothing playing");
      setEllipsisTitle(document.getElementById("now-artist"), subtitle);
      document.getElementById("now-badges").hidden = true;
      document.getElementById("now-badges").innerHTML = "";
      audio.removeAttribute("src");
      audio.load();
      clearWaveform();
      updateSeekUi();
      updatePlayButton();
    }

    function isTextTruncated(el) {
      return el.scrollWidth > el.clientWidth + 1;
    }

    function ensureEllipsisTipEl() {
      if (!ellipsisTipEl) ellipsisTipEl = document.getElementById("ellipsis-tip");
      return ellipsisTipEl;
    }

    function hideEllipsisTip() {
      clearTimeout(ellipsisTipTimer);
      ellipsisTipTimer = null;
      ellipsisTipAnchor = null;
      const tip = ensureEllipsisTipEl();
      if (!tip) return;
      tip.classList.remove("is-visible", "is-artist");
      tip.hidden = true;
    }

    function positionEllipsisTip(anchor, tip) {
      const rect = anchor.getBoundingClientRect();
      tip.hidden = false;
      tip.style.left = "0px";
      tip.style.top = "0px";
      const tipRect = tip.getBoundingClientRect();
      let top = rect.top - tipRect.height - 6;
      let left = rect.left;
      if (top < 8) top = rect.bottom + 6;
      left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));
      tip.style.left = `${left}px`;
      tip.style.top = `${top}px`;
    }

    function showEllipsisTip(anchor) {
      const text = anchor.dataset.fullText;
      if (!text || !anchor.classList.contains("is-truncated")) return;
      const tip = ensureEllipsisTipEl();
      if (!tip) return;
      tip.textContent = text;
      tip.classList.toggle("is-artist", anchor.classList.contains("player-artist") || anchor.classList.contains("neighbor-artist"));
      positionEllipsisTip(anchor, tip);
      tip.classList.add("is-visible");
    }

    function scheduleEllipsisTip(anchor) {
      if (ellipsisTipAnchor === anchor) return;
      hideEllipsisTip();
      ellipsisTipAnchor = anchor;
      ellipsisTipTimer = setTimeout(() => {
        if (ellipsisTipAnchor === anchor) showEllipsisTip(anchor);
      }, ELLIPSIS_TIP_SHOW_MS);
    }

    function bindEllipsisTips() {
      document.addEventListener("mouseover", (event) => {
        const el = event.target.closest(ELLIPSIS_TIP_SELECTOR);
        if (!el?.dataset.fullText || !el.classList.contains("is-truncated")) return;
        scheduleEllipsisTip(el);
      });

      document.addEventListener("mouseout", (event) => {
        if (!ellipsisTipAnchor) return;
        const el = event.target.closest(ELLIPSIS_TIP_SELECTOR);
        if (el !== ellipsisTipAnchor) return;
        hideEllipsisTip();
      });

      window.addEventListener("scroll", hideEllipsisTip, true);
      window.addEventListener("resize", hideEllipsisTip);
    }

    function syncEllipsisTitle(el) {
      if (!el) return;
      const text = el.dataset.fullText ?? el.textContent ?? "";
      el.removeAttribute("title");
      if (!text) {
        el.classList.remove("is-truncated");
        return;
      }
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (!el.isConnected) return;
          el.classList.toggle("is-truncated", isTextTruncated(el));
          if (ellipsisTipAnchor === el && !el.classList.contains("is-truncated")) hideEllipsisTip();
        });
      });
    }

    function setEllipsisTitle(el, text) {
      if (!el) return;
      const value = text ?? "";
      el.textContent = value;
      el.dataset.fullText = value;
      syncEllipsisTitle(el);
    }

    function syncEllipsisTooltips(root = document) {
      root.querySelectorAll(".player-title, .player-artist, .neighbor-title, .neighbor-artist").forEach(el => {
        if (!el.dataset.fullText && el.textContent) el.dataset.fullText = el.textContent;
        syncEllipsisTitle(el);
      });
    }

    function updatePlayerTrack(track) {
      const title = track.title || "Unknown title";
      const artist = track.artist || "Unknown artist";
      setEllipsisTitle(document.getElementById("now-title"), title);
      setEllipsisTitle(document.getElementById("now-artist"), artist);
      const badges = document.getElementById("now-badges");
      badges.hidden = false;
      badges.innerHTML = trackBadgeHtml(track);
      updatePlayButton();
    }

    function buildTrackTooltip(track) {
      let warn = "";
      if (track.bpm_octave_corrected && track.bpm_raw != null && Math.abs(track.bpm - track.bpm_raw) >= 4) {
        warn = track.bpm_source === "tag"
          ? `Half-time tag (${Math.round(track.bpm_raw)}→${Math.round(track.bpm)} BPM)`
          : `Octave corrected (${Math.round(track.bpm_raw)}→${Math.round(track.bpm)} BPM)`;
      } else if (track.bpm_confidence != null && track.bpm_confidence < LOW_BPM_CONFIDENCE) {
        warn = `Low BPM confidence (${track.bpm_confidence.toFixed(2)}) — verify in Rekordbox`;
      }

      const meta = [track.genre, track.batch, track.duration_sec ? formatDuration(track.duration_sec) : null]
        .filter(Boolean)
        .map(part => `<span>${part}</span>`)
        .join("");

      return `
        <div class="tooltip-title">${track.title || "Unknown title"}</div>
        <div class="tooltip-artist">${track.artist || "Unknown artist"}</div>
        <div class="tooltip-badges">${trackBadgeHtml(track)}</div>
        ${warn ? `<div class="tooltip-warn">${warn}</div>` : ""}
        ${meta ? `<div class="tooltip-meta">${meta}</div>` : ""}
      `;
    }

    function playTrackAt(index, autoplay = true) {
      if (!state.playQueue.length) syncPlayQueue();
      if (!state.playQueue.length || index < 0 || index >= state.playQueue.length) return;
      state.playIndex = index;
      const track = state.playQueue[index];
      state.playingId = track.id;
      if (state.highlightNeighbors) {
        state.selectedId = state.neighborQueueAnchor;
      } else {
        state.selectedId = track.id;
      }
      updatePlayerTrack(track);
      waveformWrap.classList.remove("is-empty");
      loadTrackAudio(track.id, autoplay);
      resumeAudioContext().catch(() => {});
      updatePlayButton();
      updateSeekUi();
      state.refreshHighlight?.();
    }

    function setNowPlaying(track, autoplay = true) {
      if (state.highlightNeighbors) {
        const anchorId = neighborAnchorId();
        if (anchorId) {
          const { ids } = mixNeighbors(anchorId, filteredTracks());
          if (ids.has(track.id)) {
            state.neighborQueueAnchor = anchorId;
            state.selectedId = anchorId;
            syncPlayQueue();
            const idx = PB.resolvePlayIndex(state.playQueue, track.id);
            if (idx >= 0) {
              playTrackAt(idx, autoplay);
              return;
            }
          }
        }
        state.selectedId = track.id;
        state.neighborQueueAnchor = track.id;
        syncPlayQueue();
        const idx = PB.resolvePlayIndex(state.playQueue, track.id);
        playTrackAt(idx >= 0 ? idx : 0, autoplay);
        return;
      }
      state.selectedId = track.id;
      syncPlayQueue();
      const idx = PB.resolvePlayIndex(state.playQueue, track.id);
      playTrackAt(idx, autoplay);
    }

    function togglePlayPause() {
      if (!audio.src) return;
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
      updatePlayButton();
    }

    function isTypingTarget(el) {
      if (!el) return false;
      const tag = el.tagName;
      return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || el.isContentEditable;
    }

    function handleSpaceToggle(event) {
      if (event.code !== "Space" && event.key !== " ") return;
      if (isTypingTarget(event.target)) return;
      event.preventDefault();
      togglePlayPause();
    }

    function playRelative(step) {
      syncPlayQueue();
      if (!state.playQueue.length) return;
      const idx = PB.advancePlayIndex(state.playQueue, state.playIndex, step);
      playTrackAt(idx, true);
    }

    function updateCamelotLegend() {
      const legend = document.getElementById("legend");
      const size = CAMELOT_WHEEL_SIZE;
      const cx = size / 2;
      const cy = size / 2;
      const rInner = 14;
      const rMid = 45;
      const rOuter = 76;
      const filterOn = state.activeKeys.size > 0;
      legend.classList.toggle("is-filtering", filterOn);
      let svg = "";

      for (let slot = 0; slot < 12; slot++) {
        const keyNum = slot === 0 ? 12 : slot;
        const start = slot * (Math.PI * 2 / 12) - Math.PI / 2;
        const end = (slot + 1) * (Math.PI * 2 / 12) - Math.PI / 2;
        const mid = (start + end) / 2;
        [
          { suffix: "A", r0: rInner, r1: rMid },
          { suffix: "B", r0: rMid, r1: rOuter }
        ].forEach(({ suffix, r0, r1 }) => {
          const code = `${keyNum}${suffix}`;
          const color = CAMELOT_COLORS[code];
          const labelR = (r0 + r1) / 2;
          const lx = cx + Math.cos(mid) * labelR;
          const ly = cy + Math.sin(mid) * labelR;
          const labelColor = camelotLabelColor(color);
          const active = state.activeKeys.has(code);
          svg += `<path class="camelot-key${active ? " active" : ""}" data-key="${code}" role="button" tabindex="0" aria-pressed="${active}" aria-label="Filter ${code}" d="${annularWedge(cx, cy, r0, r1, start, end)}" fill="${color}" stroke="rgba(0,0,0,0.12)" stroke-width="0.45"/>`;
          svg += `<text class="camelot-key-label${active ? " active" : ""}" data-key="${code}" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="central" fill="${labelColor}">${code}</text>`;
        });
      }

      legend.innerHTML = `
        <div class="legend-panel-header">
          <button type="button" class="legend-panel-toggle" aria-expanded="${state.camelotLegendCollapsed ? "false" : "true"}" aria-controls="legend-body">
            <span class="legend-panel-chevron" aria-hidden="true"></span>
            <span class="legend-title filter-header-title">Camelot</span>
          </button>
          <button type="button" class="bpm-reset camelot-reset" title="Reset key filters" aria-label="Reset Camelot key filters"${filterOn ? "" : " disabled"}>↺</button>
        </div>
        <div class="legend-panel-body" id="legend-body">
          <span class="legend-hint filter-hint">${filterOn ? "Showing selected keys" : "Click a key to filter tracks"}</span>
          <svg class="camelot-wheel" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-label="Camelot key wheel">
            ${svg}
          </svg>
        </div>`;
      syncCamelotLegendCollapse();
    }

    function resetCamelotFilter() {
      if (!state.activeKeys.size) return;
      state.activeKeys.clear();
      renderGraph();
    }

    function populateGenres(tracks) {
      const select = document.getElementById("genre");
      const genres = [...new Set(tracks.flatMap(t => [t.genre, t.batch].filter(Boolean)))].sort();
      genres.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g;
        opt.textContent = g;
        select.appendChild(opt);
      });
    }

    function zoomFilter(event) {
      if (event.type === "wheel") return true;
      if (event.type.startsWith("touch")) return true;
      if (event.button === 1) return true;
      if (state.layout === "explore") {
        if (event.altKey || event.shiftKey) {
          return event.type === "mousedown" && event.button === 0;
        }
        const target = event.target;
        if (target.closest && target.closest("circle.core")) return false;
        return event.type === "mousedown" && event.button === 0;
      }
      return event.type === "mousedown" && event.button === 0;
    }

    function bindZoom(svg, viewport) {
      if (!state.zoomBehavior) {
        state.zoomBehavior = d3.zoom().scaleExtent([1, 10]);
      }
      state.zoomBehavior
        .filter(zoomFilter)
        .on("start", (event) => {
          if (!event.sourceEvent) return;
          svg.classed("is-panning", true);
          state.zoomGestureMoved = false;
          state.zoomGestureStart = { x: event.sourceEvent.clientX, y: event.sourceEvent.clientY };
        })
        .on("end", (event) => {
          if (!event.sourceEvent) return;
          svg.classed("is-panning", false);
          const movedFromStart = state.zoomGestureStart
            ? Math.hypot(
              event.sourceEvent.clientX - state.zoomGestureStart.x,
              event.sourceEvent.clientY - state.zoomGestureStart.y
            ) > LOUPE.clickDragTolerance
            : false;
          if (state.zoomGestureMoved || movedFromStart) {
            state.pointerDragged = true;
          }
          state.zoomGestureStart = null;
        })
        .on("zoom", (event) => {
          if (event.sourceEvent && event.sourceEvent.type !== "wheel") {
            state.zoomGestureMoved = true;
          }
          const { plotLeft, plotWidth, plotHeight } = plotSize();
          const next = clampTransform(event.transform, plotLeft, plotWidth, plotHeight, state.layout);
          state.zoomTransform = next;
          viewport.attr("transform", next);
          syncAxisTickLabels(next);
          if (state.hoveredId) {
            const hovered = state.renderedTracks.find(t => t.id === state.hoveredId);
            if (hovered) showLoupeForTrack(hovered, state.renderedTracks);
          }
        });
      svg.call(state.zoomBehavior);
      svg.call(state.zoomBehavior.transform, state.zoomTransform);
    }

    function renderGraph() {
      const tracks = filteredTracks();
      updateNeighborList(tracks);
      syncUiLayout();
      if (state.hoveredId && !tracks.some(t => t.id === state.hoveredId)) {
        state.hoveredId = null;
        tooltip.style.opacity = 0;
        hideLoupe();
      }
      const edges = visibleEdgeSet(tracks);
      syncPlayQueue();

      d3.select("#graph").classed("is-over-node", false).classed("layout-explore", state.layout === "explore");

      const { width, height, plotLeft, plotWidth, plotHeight } = plotSize();
      state.plotWidth = plotWidth;
      state.plotHeight = plotHeight;
      const x = bpmScale(plotWidth);
      const y = energyScale(plotHeight);
      let svg = d3.select("#graph");

      if (state.svg && state.viewport) {
        state.viewport.selectAll("*").remove();
        drawAxisLabels(state.axisLayer, plotLeft, plotWidth, plotHeight);
      } else {
        svg.selectAll("*").remove();
        svg.attr("viewBox", `0 0 ${width} ${height}`);

        state.axisLayer = svg.append("g").attr("class", "axis-layer");
        state.viewport = svg.append("g").attr("class", "viewport");
        state.axisTickLayer = svg.append("g").attr("class", "axis-tick-layer");
        ensureMomentDefs(svg);
        state.zoomTransform = clampTransform(
          d3.zoomIdentity.translate(plotLeft, PLOT.margin.top),
          plotLeft,
          plotWidth,
          plotHeight,
          state.layout
        );
        drawAxisLabels(state.axisLayer, plotLeft, plotWidth, plotHeight);
      }

      bindZoom(svg, state.viewport);
      state.svg = svg;
      svg.attr("viewBox", `0 0 ${width} ${height}`);
      ensureMomentDefs(svg);
      state.viewport.attr("transform", state.zoomTransform);
      drawAxisLabels(state.axisLayer, plotLeft, plotWidth, plotHeight);

      const viewport = state.viewport;

      viewport.append("rect")
        .attr("class", "zoom-surface")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", plotWidth)
        .attr("height", plotHeight)
        .attr("fill", "transparent")
        .style("pointer-events", "all");

      drawSetMoments(viewport, x, y, plotWidth, plotHeight);
      updateMomentsLegend();
      updateCamelotLegend();

      drawGrid(viewport, x, y, plotWidth, plotHeight);

      tracks.forEach(t => {
        const pos = trackPosition(t, x, y, true, plotWidth, plotHeight);
        t.x = pos.x;
        t.y = pos.y;
        t.fx = null;
        t.fy = null;
      });

      const linkData = linkForceData(edges);
      const showGlobalLinks = state.layout === "explore";
      const simulation = d3.forceSimulation(tracks)
        .alphaDecay(0.025)
        .force("link", d3.forceLink(linkData).id(d => d.id).distance(d => 90 - d.score * 40).strength(d => state.layout === "explore" ? d.score * 0.35 : 0))
        .force("charge", d3.forceManyBody().strength(state.layout === "explore" ? -20 : -4))
        .force("collide", d3.forceCollide().radius(6).strength(0.92));

      if (state.layout === "mix") {
        simulation
          .force("x", d3.forceX(d => trackPosition(d, x, y, true, plotWidth, plotHeight).x).strength(0.1))
          .force("y", d3.forceY(d => trackPosition(d, x, y, true, plotWidth, plotHeight).y).strength(0.2));
      } else {
        simulation
          .force("x", d3.forceX(d => trackPosition(d, x, y, true, plotWidth, plotHeight).x).strength(0.06))
          .force("y", d3.forceY(d => trackPosition(d, x, y, true, plotWidth, plotHeight).y).strength(0.12));
      }

      let link = null;
      if (showGlobalLinks) {
        link = viewport.append("g").attr("class", "links").selectAll("line").data(linkData).join("line")
          .attr("class", "link")
          .style("pointer-events", "none");
      }

      const mixLinks = viewport.append("g").attr("class", "mix-links");

      function updateMixLinks() {
        mixLinks.selectAll("*").remove();
        const active = neighborAnchorId();
        if (!active || !state.highlightNeighbors) return;
        const selected = tracks.find(t => t.id === active);
        if (!selected || selected.x == null) return;
        const { list } = mixNeighbors(active, tracks);
        mixLinks.selectAll("line")
          .data(list)
          .join("line")
          .attr("class", "link highlight mix-link")
          .attr("vector-effect", "non-scaling-stroke")
          .attr("x1", selected.x)
          .attr("y1", selected.y)
          .attr("x2", d => d.x)
          .attr("y2", d => d.y);
      }

      const drag = d3.drag()
        .clickDistance(4)
        .filter((event) => state.layout === "explore" && !event.altKey && !event.shiftKey)
        .on("start", (event, d) => {
          state.pointerDragged = true;
          event.sourceEvent.stopPropagation();
          if (!event.active) simulation.alphaTarget(0.25).restart();
          const [px, py] = d3.pointer(event, viewport.node());
          d.fx = px;
          d.fy = py;
        })
        .on("drag", (event, d) => {
          const [px, py] = d3.pointer(event, viewport.node());
          d.fx = px;
          d.fy = py;
        })
        .on("end", (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
        });

      const node = viewport.append("g").attr("class", "nodes").selectAll("g").data(tracks).join("g")
        .attr("class", d => {
          const parts = ["node"];
          if (d.id === state.playingId) parts.push("playing");
          if (d.bpm_octave_corrected) parts.push("bpm-corrected");
          return parts.join(" ");
        })
        .call(drag);

      node.append("circle")
        .attr("class", "core")
        .attr("vector-effect", "non-scaling-stroke")
        .attr("r", d => nodeVisualRadius(d))
        .attr("fill", d => camelotColor(d.key))
        .attr("stroke", "rgba(0,0,0,0.12)");

      function updateHoveredNode() {
        const hoveredId = state.hoveredId;
        node.classed("hovered", d => d.id === hoveredId);
        if (hoveredId) node.filter(d => d.id === hoveredId).raise();
      }

      function refreshHighlight() {
        const active = neighborAnchorId();
        const neighbors = active && state.highlightNeighbors ? neighborIds(active) : null;
        node.classed("selected", d => d.id === active);
        node.classed("playing", d => d.id === state.playingId);
        node.classed("neighbor", d => neighbors && neighbors.has(d.id) && d.id !== active);
        node.classed("dim", d => neighbors && !neighbors.has(d.id));
        node.classed("obscured", d => isNodeObscured(d));
        if (link) {
          link.style("opacity", state.highlightNeighbors ? 0 : 1);
        }
        updateMixLinks();
        updateNeighborsButton(active, neighbors ? neighbors.size : 0);
        updateNeighborList(tracks);
      }

      state.renderedTracks = tracks;

      simulation.on("tick", () => {
        if (link) {
          link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);
        }
        node.attr("transform", d => `translate(${d.x},${d.y})`);
        node.classed("obscured", d => isNodeObscured(d));
        if (state.highlightNeighbors) updateMixLinks();
        if (state.hoveredId) {
          const hovered = tracks.find(t => t.id === state.hoveredId);
          if (hovered) showLoupeForTrack(hovered, tracks);
        }
      });

      refreshHighlight();
      state.refreshHighlight = refreshHighlight;
      state.updateHoveredNode = updateHoveredNode;

      if (state.highlightNeighbors && neighborAnchorId()) {
        simulation.on("end", () => focusOnIds(neighborIds(neighborAnchorId())));
      }

      if (state.prevLayout !== state.layout) {
        resetView(false);
        state.prevLayout = state.layout;
      }

      maybeAutoFitViewForFilters(tracks, simulation);

      updateSearchResults(tracks);
    }

    function resetView(animate = true) {
      if (!state.svg || !state.zoomBehavior) return;
      const { plotLeft, plotWidth, plotHeight } = plotSize();
      const transform = clampTransform(
        d3.zoomIdentity.translate(plotLeft, PLOT.margin.top),
        plotLeft,
        plotWidth,
        plotHeight,
        state.layout
      );
      state.zoomTransform = transform;
      if (animate) {
        state.svg.transition().duration(350).call(state.zoomBehavior.transform, transform);
      } else {
        state.svg.call(state.zoomBehavior.transform, transform);
      }
    }

    function updateBpmLabel() {
      document.getElementById("bpm-min-label").textContent = String(state.bpmMin);
      document.getElementById("bpm-max-label").textContent = String(state.bpmMax);
      const lo = PLOT.bpmDomain[0];
      const hi = PLOT.bpmDomain[1];
      const span = hi - lo || 1;
      const left = ((state.bpmMin - lo) / span) * 100;
      const width = ((state.bpmMax - state.bpmMin) / span) * 100;
      const fill = document.getElementById("bpm-range-fill");
      fill.style.left = `${left}%`;
      fill.style.width = `${width}%`;
    }

    function updateBpmResetButton() {
      const btn = document.getElementById("bpm-reset");
      if (!btn) return;
      btn.disabled = state.bpmMin === PLOT.bpmDomain[0] && state.bpmMax === PLOT.bpmDomain[1];
    }

    function syncBpmInputs() {
      const minInput = document.getElementById("bpm-min");
      const maxInput = document.getElementById("bpm-max");
      let min = Number(minInput.value);
      let max = Number(maxInput.value);
      if (min > max) {
        if (document.activeElement === minInput) {
          max = min;
        } else {
          min = max;
        }
      }
      state.bpmMin = min;
      state.bpmMax = max;
      minInput.value = String(min);
      maxInput.value = String(max);
      updateBpmLabel();
      updateBpmResetButton();
      renderGraph();
    }

    function bpmFromTrackClick(clientX) {
      const track = document.getElementById("bpm-range-track");
      if (!track) return null;
      const rect = track.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const lo = PLOT.bpmDomain[0];
      const hi = PLOT.bpmDomain[1];
      return Math.round(lo + ratio * (hi - lo));
    }

    function setBpmFromTrackClick(clientX) {
      const bpm = bpmFromTrackClick(clientX);
      if (bpm == null) return;
      const minInput = document.getElementById("bpm-min");
      const maxInput = document.getElementById("bpm-max");
      const distToMin = Math.abs(bpm - state.bpmMin);
      const distToMax = Math.abs(bpm - state.bpmMax);
      if (distToMin <= distToMax) {
        minInput.value = String(Math.min(bpm, state.bpmMax));
        minInput.focus({ preventScroll: true });
      } else {
        maxInput.value = String(Math.max(bpm, state.bpmMin));
        maxInput.focus({ preventScroll: true });
      }
      syncBpmInputs();
    }

    function resetBpmRange() {
      const lo = PLOT.bpmDomain[0];
      const hi = PLOT.bpmDomain[1];
      document.getElementById("bpm-min").value = String(lo);
      document.getElementById("bpm-max").value = String(hi);
      state.bpmMin = lo;
      state.bpmMax = hi;
      updateBpmLabel();
      updateBpmResetButton();
      renderGraph();
    }

    async function init() {
      syncUiLayout();
      updateCamelotLegend();
      bindGraphInteraction();
      const res = await fetch("/api/library");
      state.data = await res.json();
      populateGenres(state.data.tracks);
      renderGraph();

      document.getElementById("search").addEventListener("input", e => {
        state.search = e.target.value;
        state.searchResultsIndex = -1;
        state.searchResultsOpen = !!state.search.trim();
        renderGraph();
      });

      document.getElementById("search").addEventListener("focus", () => {
        if (!state.search.trim()) return;
        state.searchResultsOpen = true;
        updateSearchResults(filteredTracks());
      });

      document.getElementById("search").addEventListener("blur", () => {
        setTimeout(() => hideSearchResults(), 150);
      });

      document.getElementById("search").addEventListener("keydown", handleSearchKeydown);

      document.getElementById("search-results").addEventListener("mousedown", event => {
        event.preventDefault();
      });

      document.getElementById("search-results").addEventListener("click", event => {
        const btn = event.target.closest(".search-result-item");
        if (!btn?.dataset.trackId) return;
        activateSearchResult(Number(btn.dataset.searchIndex));
      });

      document.getElementById("genre").addEventListener("change", e => {
        state.genre = e.target.value;
        renderGraph();
      });

      ["bpm-min", "bpm-max"].forEach(id => {
        document.getElementById(id).addEventListener("input", syncBpmInputs);
      });
      document.getElementById("bpm-range-track").addEventListener("click", (e) => {
        setBpmFromTrackClick(e.clientX);
      });
      document.getElementById("bpm-reset").addEventListener("click", resetBpmRange);
      updateBpmLabel();
      updateBpmResetButton();

      document.querySelectorAll("#source-filters .chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const src = chip.dataset.source;
          state.sources = src === "all"
            ? new Set(["tracks", "to_curate"])
            : new Set([src]);
          syncSourceFilterChips();
          renderGraph();
        });
      });

      document.querySelectorAll("#view-controls .chip[data-layout]").forEach(chip => {
        chip.addEventListener("click", () => {
          document.querySelectorAll("#view-controls .chip[data-layout]").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          state.layout = chip.dataset.layout;
          renderGraph();
        });
      });

      document.getElementById("moments-legend").addEventListener("click", (e) => {
        if (e.target.closest(".legend-panel-toggle")) {
          state.momentsLegendCollapsed = !state.momentsLegendCollapsed;
          syncMomentsLegendCollapse();
          return;
        }
        if (e.target.closest(".moments-reset")) {
          resetMomentsFilter();
          return;
        }
        const btn = e.target.closest(".moment-legend-item");
        if (!btn) return;
        const id = btn.dataset.momentId;
        if (state.activeMoments.has(id)) state.activeMoments.delete(id);
        else state.activeMoments.add(id);
        renderGraph();
      });

      document.getElementById("legend").addEventListener("click", (e) => {
        if (e.target.closest(".legend-panel-toggle")) {
          state.camelotLegendCollapsed = !state.camelotLegendCollapsed;
          syncCamelotLegendCollapse();
          return;
        }
        if (e.target.closest(".camelot-reset")) {
          resetCamelotFilter();
          return;
        }
        const seg = e.target.closest(".camelot-key");
        if (!seg) return;
        const key = seg.dataset.key;
        if (state.activeKeys.has(key)) state.activeKeys.delete(key);
        else state.activeKeys.add(key);
        renderGraph();
      });

      document.getElementById("legend").addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const seg = e.target.closest(".camelot-key");
        if (!seg) return;
        e.preventDefault();
        const key = seg.dataset.key;
        if (state.activeKeys.has(key)) state.activeKeys.delete(key);
        else state.activeKeys.add(key);
        renderGraph();
      });

      document.getElementById("play-btn").addEventListener("click", togglePlayPause);
      document.getElementById("prev-btn").addEventListener("click", () => playRelative(-1));
      document.getElementById("next-btn").addEventListener("click", () => playRelative(1));
      document.addEventListener("keydown", handleSpaceToggle);

      setupWaveform();
      bindEllipsisTips();
      const playerDock = document.getElementById("player-dock");
      if (playerDock) {
        new ResizeObserver(() => {
          syncUiLayout();
          syncEllipsisTooltips(playerDock);
          drawWaveform(getWaveformProgress());
          if (state.data) renderGraph();
        }).observe(playerDock);
      }
      const filterBar = document.getElementById("filter-bar");
      if (filterBar) {
        new ResizeObserver(() => {
          syncUiLayout();
          if (state.data) renderGraph();
        }).observe(filterBar);
      }
      const neighborPanel = document.getElementById("neighbor-panel");
      if (neighborPanel) {
        new ResizeObserver(() => {
          syncUiLayout();
          if (state.data) renderGraph();
        }).observe(neighborPanel);
      }
      syncUiLayout();
      audio.addEventListener("timeupdate", updateSeekUi);
      audio.addEventListener("loadedmetadata", updateSeekUi);
      audio.addEventListener("play", updatePlayButton);
      audio.addEventListener("pause", updatePlayButton);
      audio.addEventListener("ended", () => playRelative(1));

      document.getElementById("neighbors-btn").addEventListener("click", () => {
        if (!state.selectedId) {
          setPlayerIdle("Select a track on the graph first");
          return;
        }
        state.highlightNeighbors = !state.highlightNeighbors;
        if (state.highlightNeighbors) {
          state.neighborQueueAnchor = state.selectedId;
          syncPlayQueue();
          const ids = neighborIds(state.selectedId);
          setTimeout(() => focusOnIds(ids), 300);
        } else {
          state.neighborQueueAnchor = null;
          syncPlayQueue();
        }
        renderGraph();
      });

      document.getElementById("neighbor-list").addEventListener("click", (event) => {
        const btn = event.target.closest(".neighbor-item");
        if (!btn?.dataset.trackId || !state.data) return;
        const track = state.data.tracks.find(t => t.id === btn.dataset.trackId);
        if (track) setNowPlaying(track);
      });

      document.getElementById("neighbor-panel-toggle").addEventListener("click", () => {
        if (!state.highlightNeighbors) return;
        state.neighborQueueCollapsed = !state.neighborQueueCollapsed;
        syncNeighborPanelCollapse();
        renderGraph();
      });

      updateNeighborsButton(null, 0);

      document.getElementById("reset-view-btn").addEventListener("click", () => {
        if (state.autoFitTimer) {
          clearTimeout(state.autoFitTimer);
          state.autoFitTimer = null;
        }
        resetView(true);
      });

      window.addEventListener("resize", () => {
        state.svg = null;
        state.viewport = null;
        state.axisLayer = null;
        state.axisTickLayer = null;
        state.zoomBehavior = null;
        renderGraph();
      });
    }

    init();
  </script>
</body>
</html>
