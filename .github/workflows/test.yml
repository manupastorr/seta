name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-and-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install audio libs for librosa
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Python unit tests
        run: .venv/bin/python -m unittest discover -s tests -v

      - name: Node unit tests
        run: node --test tests/test_playback.mjs tests/test_draft.mjs tests/test_mix_links.mjs tests/test_render_safe.mjs
